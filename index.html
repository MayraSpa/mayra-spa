<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Mayra Spa
  </title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <!-- LOGIN -->

  <section id="auth-screen">

    <div class="auth-card">

      <h1>
        Mayra Spa
      </h1>

      <p>
        Estética Facial Premium
      </p>

      <form id="auth-form">

        <input
          id="email"
          type="email"
          placeholder="Correo"
          required
        >

        <input
          id="password"
          type="password"
          placeholder="Contraseña"
          required
        >

        <button type="submit">

          Entrar / Registrarse

        </button>

      </form>

      <div id="auth-status"></div>

    </div>

  </section>

  <!-- APP -->

  <div id="app" class="hidden">

    <nav class="navbar">

      <h2>
        Mayra Spa
      </h2>

      <button id="logout-btn">

        Salir

      </button>

    </nav>

    <!-- RESERVAR -->

    <section class="section">

      <div class="card">

        <h2>
          Reservar cita
        </h2>

        <form id="booking-form">

          <input
            id="cliente"
            type="text"
            placeholder="Nombre"
            required
          >

          <input
            id="telefono"
            type="text"
            placeholder="Teléfono"
            required
          >

          <select id="servicio">

            <option>
              Limpieza Facial
            </option>

            <option>
              Hidratación
            </option>

            <option>
              Anti Acné
            </option>

          </select>

          <input
            id="fecha"
            type="date"
            required
          >

          <select id="horario">

            <option>
              9:00 AM - 11:00 AM
            </option>

            <option>
              11:30 AM - 1:30 PM
            </option>

            <option>
              2:00 PM - 4:00 PM
            </option>

          </select>

          <select id="metodo-pago">

            <option>
              Transfermovil
            </option>

            <option>
              Enzona
            </option>

            <option>
              Saldo móvil
            </option>

            <option>
              Efectivo
            </option>

          </select>

          <button type="submit">

            Agendar cita

          </button>

        </form>

        <div id="booking-status"></div>

      </div>

    </section>

    <!-- MIS CITAS -->

    <section class="section">

      <h2 class="title">

        Mis citas

      </h2>

      <div id="appointments-container"></div>

    </section>

    <!-- ADMIN -->

    <section
      id="admin-panel"
      class="hidden section"
    >

      <h2 class="title">

        Panel Admin

      </h2>

      <div id="admin-citas"></div>

    </section>

  </div>

  <script src="app.js"></script>

</body>
</html>
