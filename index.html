<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Mayra Spa</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<link
rel="stylesheet"
href="style.css"
>

</head>

<body>

<section id="auth-screen">

<div class="auth-card">

<h1>Mayra Spa</h1>

<p>Estética Facial Premium</p>

<form id="auth-form">

<input
id="email"
type="email"
placeholder="Correo"
required
>

<input
id="password"
type="password"
placeholder="Contraseña"
required
>

<button type="submit">

Entrar / Registrarse

</button>

</form>

</div>

</section>

<div
id="app"
style="display:none;"
>

<nav class="navbar">

<div>

<h2>Mayra Spa</h2>

<span>Estética Facial</span>

</div>

<div class="user-info">

<span id="logged-user"></span>

<button id="logout-btn">

Salir

</button>

</div>

</nav>

<div class="main-grid">

<section class="card">

<h2 class="title">

Reservar cita

</h2>

<form id="booking-form">

<input
id="cliente"
type="text"
placeholder="Nombre"
required
>

<input
id="telefono"
type="text"
placeholder="Teléfono"
required
>

<select id="servicio"></select>

<input
id="fecha"
type="date"
required
>

<select id="horario"></select>

<select id="metodo-pago">

<option>
Transfermovil
</option>

<option>
Enzona
</option>

<option>
Saldo móvil
</option>

<option>
Efectivo
</option>

</select>

<div id="payment-info"></div>

<button type="submit">

Agendar cita

</button>

</form>

</section>

<section class="card">

<h2 class="title">

Mis citas

</h2>

<div id="appointments-container"></div>

</section>

</div>

<section
id="admin-panel"
class="admin-section"
style="display:none;"
>

<h2 class="title">

👑 Panel Admin

</h2>

<div class="config-grid">

<div class="card">

<h3>Servicios</h3>

<textarea id="admin-servicios"></textarea>

</div>

<div class="card">

<h3>Horarios</h3>

<textarea id="admin-horarios"></textarea>

</div>

<div class="card">

<h3>Transfermovil</h3>

<input id="transfermovil">

<input
id="telefono-transfermovil"
placeholder="Teléfono confirmación"
>

<h3>Enzona</h3>

<input id="enzona">

<input
id="telefono-enzona"
placeholder="Teléfono confirmación"
>

<h3>Saldo móvil</h3>

<input id="saldo-movil">

<button onclick="saveConfig()">

Guardar configuración

</button>

</div>

</div>

<div class="config-grid">

<div class="card">

<h3>Bloquear día</h3>

<input
type="date"
id="bloqueo-fecha"
>

<button onclick="blockFullDay()">

Bloquear día

</button>

</div>

<div class="card">

<h3>Bloquear turno</h3>

<input
type="date"
id="bloqueo-turno-fecha"
>

<select
id="bloqueo-turno-horario"
></select>

<button onclick="blockShift()">

Bloquear turno

</button>

</div>

</div>

<div class="admin-filters">

<button onclick="filterAppointments('Todas')">
Todas
</button>

<button onclick="filterAppointments('Procesando')">
Procesando
</button>

<button onclick="filterAppointments('Confirmada')">
Confirmadas
</button>

<button onclick="filterAppointments('Cancelada')">
Canceladas
</button>

</div>

<div id="admin-citas"></div>

</section>

</div>

<script src="app.js"></script>

</body>

</html>
