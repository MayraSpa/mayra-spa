<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Mayra Spa Estética Facial
  </title>

  <meta
    name="description"
    content="Mayra Spa Estética Facial"
  />

  <!-- TAILWIND -->

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- SUPABASE -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- LOADER -->

  <div id="loader">

    <div class="spinner"></div>

  </div>

  <!-- AUTH -->

  <section id="auth-screen">

    <div class="auth-card">

      <h1>
        Mayra Spa
      </h1>

      <p>
        Estética Facial Premium
      </p>

      <form id="auth-form">

        <input
          id="email"
          type="email"
          placeholder="Correo"
          required
        />

        <input
          id="password"
          type="password"
          placeholder="Contraseña"
          required
        />

        <button type="submit">

          Entrar / Registrarse

        </button>

      </form>

      <div id="auth-status"></div>

    </div>

  </section>

  <!-- APP -->

  <div id="app" class="hidden">

    <!-- NAVBAR -->

    <nav class="navbar">

      <h2>
        Mayra Spa
      </h2>

      <div class="nav-links">

        <a href="#dashboard">
          Inicio
        </a>

        <a href="#reservar">
          Reservar
        </a>

        <a href="#mis-citas">
          Mis citas
        </a>

        <button id="logout-btn">

          Salir

        </button>

      </div>

    </nav>

    <!-- HERO -->

    <section id="dashboard" class="hero">

      <div class="hero-content">

        <h1>
          Bienvenida a
          Mayra Spa
        </h1>

        <p>
          Cuidado facial premium,
          relajación y belleza.
        </p>

      </div>

    </section>

    <!-- INFO -->

    <section class="info-grid">

      <div class="info-card">

        <h3>
          💜 Horarios
        </h3>

        <p>
          Martes a sábado
        </p>

        <p>
          9:00 AM - 4:00 PM
        </p>

      </div>

      <div class="info-card">

        <h3>
          💳 Pago
        </h3>

        <p>
          50 CUP reserva
        </p>

      </div>

      <div class="info-card">

        <h3>
          📍 Estado
        </h3>

        <p>
          Procesando
        </p>

      </div>

    </section>

    <!-- RESERVAR -->

    <section
      id="reservar"
      class="booking-section"
    >

      <div class="card">

        <h2>
          Reservar cita
        </h2>

        <form id="booking-form">

          <input
            id="cliente"
            type="text"
            placeholder="Nombre"
            required
          />

          <input
            id="telefono"
            type="text"
            placeholder="Teléfono"
            required
          />

          <select id="servicio">

            <option>
              Limpieza Facial
            </option>

            <option>
              Hidratación
            </option>

            <option>
              Anti Acné
            </option>

          </select>

          <input
            id="fecha"
            type="date"
            required
          />

          <select id="horario">

            <option value="9:00 AM - 11:00 AM">
              9:00 AM - 11:00 AM
            </option>

            <option value="11:30 AM - 1:30 PM">
              11:30 AM - 1:30 PM
            </option>

            <option value="2:00 PM - 4:00 PM">
              2:00 PM - 4:00 PM
            </option>

          </select>

          <select id="metodo-pago">

            <option>
              Transfermovil
            </option>

            <option>
              Enzona
            </option>

            <option>
              Saldo móvil
            </option>

            <option>
              Efectivo
            </option>

          </select>

          <input
            id="codigo"
            type="text"
            placeholder="Código confirmación"
            required
          />

          <button type="submit">

            Reservar (50 CUP)

          </button>

        </form>

        <div id="booking-status"></div>

      </div>

    </section>

    <!-- MIS CITAS -->

    <section id="mis-citas">

      <h2 class="section-title">

        Mis citas

      </h2>

      <div
        id="appointments-container"
      ></div>

    </section>

    <!-- ADMIN -->

    <section
      id="admin-panel"
      class="hidden"
    >

      <h2 class="section-title">

        Panel administrador

      </h2>

      <div id="admin-citas"></div>

    </section>

  </div>

  <!-- WHATSAPP -->

  <a
    href="https://wa.me/5359740626"
    target="_blank"
    class="whatsapp-btn"
  >
    💬
  </a>

  <script src="app.js"></script>

</body>
</html>
