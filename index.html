<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Mayra Spa Estética Facial
  </title>

  <!-- TAILWIND -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- LOGIN SCREEN -->

  <section id="auth-screen" class="auth-screen">

    <div class="auth-card">

      <h1>
        Mayra Spa
      </h1>

      <p>
        Estética Facial Premium
      </p>

      <form id="auth-form">

        <input
          id="email"
          type="email"
          placeholder="Correo"
          required
        />

        <input
          id="password"
          type="password"
          placeholder="Contraseña"
          required
        />

        <button type="submit">
          Entrar / Registrarse
        </button>

      </form>

      <div id="auth-status"></div>

    </div>

  </section>

  <!-- APP -->

  <div id="app" class="hidden">

    <!-- NAVBAR -->

    <nav class="navbar">

      <h1>
        Mayra Spa
      </h1>

      <div class="nav-links">

        <a href="#reservar">
          Reservar
        </a>

        <a href="#mis-citas">
          Mis citas
        </a>

        <button id="logout-btn">
          Salir
        </button>

      </div>

    </nav>

    <!-- HERO -->

    <section class="hero">

      <div class="hero-content">

        <h2>
          Bienvenida a Mayra Spa
        </h2>

        <p>
          Reserva tus tratamientos faciales premium.
        </p>

      </div>

    </section>

    <!-- RESERVA -->

    <section id="reservar" class="booking-section">

      <div class="card">

        <h2>
          Reservar cita
        </h2>

        <form id="booking-form">

          <input
            id="cliente"
            type="text"
            placeholder="Nombre"
            required
          />

          <input
            id="telefono"
            type="text"
            placeholder="Teléfono"
            required
          />

          <select id="servicio">

            <option>
              Limpieza Facial
            </option>

            <option>
              Hidratación
            </option>

            <option>
              Anti Acné
            </option>

          </select>

          <input
            id="fecha"
            type="date"
            required
          />

          <select id="horario">

            <option value="9:00 AM - 11:00 AM">
              9:00 AM - 11:00 AM
            </option>

            <option value="11:30 AM - 1:30 PM">
              11:30 AM - 1:30 PM
            </option>

            <option value="2:00 PM - 4:00 PM">
              2:00 PM - 4:00 PM
            </option>

          </select>

          <select id="metodo-pago">

            <option>
              Transfermovil
            </option>

            <option>
              Enzona
            </option>

            <option>
              Saldo móvil
            </option>

            <option>
              Efectivo
            </option>

          </select>

          <input
            id="codigo"
            type="text"
            placeholder="Código de confirmación"
            required
          />

          <button type="submit">
            Reservar (50 CUP)
          </button>

        </form>

        <div id="booking-status"></div>

      </div>

    </section>

    <!-- MIS CITAS -->

    <section id="mis-citas">

      <h2 class="section-title">
        Mis citas
      </h2>

      <div id="appointments-container"></div>

    </section>

    <!-- ADMIN -->

    <section id="admin-panel" class="hidden">

      <div class="card">

        <h2>
          Panel administrador
        </h2>

        <div id="admin-citas"></div>

      </div>

    </section>

  </div>

  <!-- WHATSAPP -->

  <a
    href="https://wa.me/5359740626"
    target="_blank"
    class="whatsapp-btn"
  >
    💬
  </a>

  <script src="app.js"></script>

</body>
</html>
