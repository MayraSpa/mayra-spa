<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Mayra Spa</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<link
rel="stylesheet"
href="style.css"
>

</head>

<body>

<!-- LOGIN -->

<section id="auth-screen">

<div class="auth-card">

<h1>Mayra Spa</h1>

<p>Estética Facial Premium</p>

<form id="auth-form">

<input
id="email"
type="email"
placeholder="Correo electrónico"
required
>

<input
id="password"
type="password"
placeholder="Contraseña"
required
>

<button type="submit">

Entrar / Registrarse

</button>

</form>

</div>

</section>

<!-- APP -->

<div
id="app"
style="display:none;"
>

<!-- NAVBAR -->

<nav class="navbar">

<div>

<h2>Mayra Spa</h2>

<span>Estética Facial Premium</span>

</div>

<div class="user-info">

<span id="logged-user"></span>

<button id="logout-btn">

Salir

</button>

</div>

</nav>

<!-- MAIN -->

<div class="main-grid">

<!-- RESERVAR -->

<section class="card">

<h2 class="title">

Reservar cita

</h2>

<form id="booking-form">

<div class="field">

<label>

👤 Nombre completo

</label>

<input
id="cliente"
type="text"
placeholder="Escribe tu nombre"
required
>

</div>

<div class="field">

<label>

📱 Número de teléfono

</label>

<input
id="telefono"
type="text"
placeholder="+53 55555555"
required
>

</div>

<div class="field">

<label>

✨ Tratamiento facial

</label>

<select id="servicio"></select>

</div>

<div class="field">

<label>

📅 Día de la cita

</label>

<input
id="fecha"
type="date"
required
>

</div>

<div class="field">

<label>

⏰ Turno disponible

</label>

<select id="horario"></select>

</div>

<div class="field">

<label>

💳 Método de pago

</label>

<select id="metodo-pago">

<option>
Transfermovil
</option>

<option>
Enzona
</option>

<option>
Saldo móvil
</option>

<option>
Efectivo
</option>

</select>

</div>

<div id="payment-info"></div>

<button type="submit">

💜 Confirmar reserva

</button>

</form>

</section>

<!-- MIS CITAS -->

<section class="card">

<h2 class="title">

Mis citas

</h2>

<div id="appointments-container"></div>

</section>

</div>

<!-- ADMIN -->

<section
id="admin-panel"
class="admin-section"
style="display:none;"
>

<h2 class="title">

👑 Panel Administrador

</h2>

<div style="margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;">

<button onclick="exportAppointmentsExcel()">

📥 Exportar Excel

</button>

<button onclick="exportAppointmentsPDF()">

📄 Exportar PDF

</button>

</div>

<!-- CONFIG -->

<div class="config-grid">

<div class="card">

<h3>Servicios</h3>

<textarea id="admin-servicios"></textarea>

</div>

<div class="card">

<h3>Horarios</h3>

<textarea id="admin-horarios"></textarea>

</div>

<div class="card">

<h3>Transfermovil</h3>

<input id="transfermovil">

<input
id="telefono-transfermovil"
placeholder="Número confirmación"
>

<h3>Enzona</h3>

<input id="enzona">

<input
id="telefono-enzona"
placeholder="Número confirmación"
>

<h3>Saldo móvil</h3>

<input id="saldo-movil">

<button onclick="saveConfig()">

Guardar configuración

</button>

</div>

</div>

<!-- BLOQUEOS -->

<div class="config-grid">

<div class="card">

<h3>Bloquear día</h3>

<input
type="date"
id="bloqueo-fecha"
>

<button onclick="blockFullDay()">

Bloquear día

</button>

</div>

<div class="card">

<h3>Bloquear turno</h3>

<input
type="date"
id="bloqueo-turno-fecha"
>

<select
id="bloqueo-turno-horario"
></select>

<button onclick="blockShift()">

Bloquear turno

</button>

</div>

</div>

<!-- FILTROS -->

<div class="admin-filters">

<button onclick="filterAppointments('Todas')">
Todas
</button>

<button onclick="filterAppointments('Procesando')">
Procesando
</button>

<button onclick="filterAppointments('Confirmada')">
Confirmadas
</button>

<button onclick="filterAppointments('Cancelada')">
Canceladas
</button>

</div>

<div id="admin-citas"></div>

</section>

</div>

<!-- WHATSAPP -->

<a
href="https://wa.me/5359740626?text=Hola%20Mayra%20Spa%20quiero%20información"
class="whatsapp-btn"
target="_blank"
>

💬

</a>

<script src="app.js"></script>

</body>

</html>
