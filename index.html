<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mayra Spa</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="bg"></div>

<div class="main-container">

<div class="logo-area">

<h1>Mayra Spa</h1>

<p>Estética Facial Premium</p>
<div class="location-box">

<h3>
📍 Nuestra ubicación
</h3>

<p>
Carr. Central No.511, Cuba
</p>

<a
href="https://maps.app.goo.gl/EEqnQ3pR5KdUDXHj6"
target="_blank"
class="map-btn"
>

Abrir en Google Maps

</a>

<iframe
src="https://www.google.com/maps?q=Carr.Central+No.511,+Cuba&output=embed"
allowfullscreen=""
loading="lazy">
</iframe>

</div>

<!-- LOGIN -->

<div id="auth-screen" class="glass-card auth-card">

<h2>Bienvenida</h2>

<form id="auth-form">

<input
type="email"
id="email"
placeholder="Correo electrónico"
required
>

<input
type="password"
id="password"
placeholder="Contraseña"
required
>

<button type="submit">
Entrar / Registrarse
</button>

</form>

<a
class="help-btn"
href="https://wa.me/5359740626"
target="_blank"
>

WhatsApp Ayuda

</a>

</div>

<!-- APP -->

<div id="app" style="display:none;">

<!-- TOPBAR -->

<div class="topbar glass-card">

<div>
👤 Usuario:
<span id="logged-user"></span>
</div>

<button id="logout-btn">
Cerrar sesión
</button>

</div>

<!-- GRID -->

<div class="grid">

<!-- RESERVAR -->

<div class="glass-card">

<h2>📅 Reservar cita</h2>

<form id="booking-form">

<label>Nombre completo</label>

<input
type="text"
id="cliente"
placeholder="Escribe tu nombre"
required
>

<label>Teléfono</label>

<input
type="text"
id="telefono"
placeholder="Número de teléfono"
required
>

<label>Servicio</label>

<select id="servicio"></select>

<label>Fecha</label>

<input
type="date"
id="fecha"
required
>

<label>Horario</label>

<select id="horario"></select>

<label>Método de pago</label>

<select id="metodo-pago">

<option>Transfermovil</option>

<option>Enzona</option>

<option>Efectivo</option>

</select>

<div id="payment-info" class="payment-box"></div>

<button type="submit">
Agendar cita
</button>

</form>

</div>

<!-- CITAS -->

<div class="glass-card">

<h2>📋 Mis citas</h2>

<div id="appointments-container"></div>

</div>

</div>

<!-- ADMIN -->

<div
id="admin-panel"
style="display:none;"
>

<div class="glass-card">

<h2>⚙️ Panel Administrador</h2>

<div class="filters">

<button onclick="filterAppointments('Todas')">
Todas
</button>

<button onclick="filterAppointments('Procesando')">
Procesando
</button>

<button onclick="filterAppointments('Confirmada')">
Confirmadas
</button>

<button onclick="filterAppointments('Cancelada')">
Canceladas
</button>

</div>

<div id="admin-citas"></div>

</div>

<!-- CONFIG -->

<div class="glass-card">

<h2>🛠 Configuración</h2>

<label>Horarios</label>

<textarea
id="admin-horarios"
rows="5"
></textarea>

<label>Servicios</label>

<textarea
id="admin-servicios"
rows="5"
></textarea>

<label>Tarjeta Transfermovil</label>

<input
type="text"
id="transfermovil"
>

<label>Teléfono Transfermovil</label>

<input
type="text"
id="telefono-transfermovil"
>

<label>Tarjeta Enzona</label>

<input
type="text"
id="enzona"
>

<label>Teléfono Enzona</label>

<input
type="text"
id="telefono-enzona"
>

<label>Saldo móvil</label>

<input
type="text"
id="saldo-movil"
>

<button onclick="saveConfig()">
Guardar configuración
</button>

</div>

<!-- EXPORTAR -->

<div class="glass-card">

<h2>📄 Exportar citas</h2>

<label>Fecha inicio</label>

<input
type="date"
id="fecha-inicio"
>

<label>Fecha final</label>

<input
type="date"
id="fecha-fin"
>

<button onclick="exportAppointmentsPDF()">
Exportar PDF
</button>

<button onclick="exportAppointmentsExcel()">
Exportar Excel
</button>

<button onclick="clearAppointments()">
Limpiar citas
</button>

</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
